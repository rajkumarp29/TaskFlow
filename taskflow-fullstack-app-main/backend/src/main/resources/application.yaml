server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/taskflow_db08
    username: root
    password: rajkumar

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  # ✅ ADD — file upload limits
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

  main:
    allow-circular-references: true

taskflow:
  security:
    first-user-admin: true