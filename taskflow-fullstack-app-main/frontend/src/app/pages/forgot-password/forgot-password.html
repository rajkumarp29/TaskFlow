<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="row shadow-2xl rounded-4 overflow-hidden w-100 max-w-5xl">

    <!-- LEFT BRAND PANEL -->
    <div class="col-md-6 bg-[#1e293b] text-white d-none d-md-flex flex-column justify-content-center align-items-center p-5">

      <h2 class="fw-bold mb-3">TaskFlow</h2>

      <p class="text-center opacity-75">
        Reset your access securely. <br>
        Stay productive without interruptions.
      </p>

      <div class="mt-4 text-center opacity-50 small">
        ✔ Secure account recovery <br>
        ✔ Fast password reset <br>
        ✔ Protected user data
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="col-md-6 bg-white p-5">

      <div class="max-w-md mx-auto">

        <h2 class="fw-bold fs-4 text-center mb-2">
          Reset Password
        </h2>

        <p class="text-center text-muted mb-4">
          Enter your email to receive reset instructions
        </p>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm">

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              placeholder="Enter your email"
              [(ngModel)]="email"
              name="email"
              required>
          </div>

          <div *ngIf="message"
               class="alert alert-success py-2">
            {{ message }}
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100 py-2"
            [disabled]="resetForm.invalid">
            Send Reset Link
          </button>

        </form>

        <p class="text-center mt-4 text-muted">
          Remembered your password?
          <a routerLink="/login"
             class="fw-semibold text-primary text-decoration-none">
            Back to Login
          </a>
        </p>

      </div>
    </div>

  </div>
</div>
